name: Daily support-docs sync

# Runs the scrape + delta-upload job once per day and on manual trigger.
# Job logs are visible under the repo's "Actions" tab; the run summary
# (last_run.json) is uploaded as an artifact on every run.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run daily delta sync
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload run summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-run-summary
          path: last_run.json
          if-no-files-found: warn
